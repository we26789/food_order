
{% extends "base.html" %}
{% block content %}
<div class="app-layout">
    <aside class="sidebar">
        <div class="sidebar-header">
            <div class="sidebar-logo">
                <div class="sidebar-logo-icon">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M6 13.87A4 4 0 0 1 7.41 6a5.11 5.11 0 0 1 1.05-1.54 5 5 0 0 1 7.08 0A5.11 5.11 0 0 1 16.59 6 4 4 0 0 1 18 13.87V21H6Z"></path>
                        <line x1="6" y1="17" x2="18" y2="17"></line>
                    </svg>
                </div>
                <div>
                    <div class="sidebar-logo-text">家庭点菜</div>
                    <div class="sidebar-role">厨师工作台</div>
                </div>
            </div>
        </div>
        <nav class="sidebar-nav">
            <div class="nav-section">
                <div class="nav-section-title">订单管理</div>
                <a href="{{ url_for('orders') }}" class="nav-link">
                    <span class="nav-link-icon"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"></path><polyline points="14 2 14 8 20 8"></polyline></svg></span>
                    <span>订单汇总</span>
                </a>
                <a href="{{ url_for('cooker_dashboard') }}" class="nav-link">
                    <span class="nav-link-icon"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7" rx="1"></rect><rect x="14" y="3" width="7" height="7" rx="1"></rect><rect x="3" y="14" width="7" height="7" rx="1"></rect><rect x="14" y="14" width="7" height="7" rx="1"></rect></svg></span>
                    <span>数据面板</span>
                </a>
            </div>
            <div class="nav-section">
                <div class="nav-section-title">菜品管理</div>
                <a href="{{ url_for('add_dish') }}" class="nav-link active">
                    <span class="nav-link-icon"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="12" y1="5" x2="12" y2="19"></line><line x1="5" y1="12" x2="19" y2="12"></line></svg></span>
                    <span>添加菜品</span>
                </a>
                <a href="{{ url_for('list_dishes') }}" class="nav-link">
                    <span class="nav-link-icon"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="8" y1="6" x2="21" y2="6"></line><line x1="8" y1="12" x2="21" y2="12"></line><line x1="8" y1="18" x2="21" y2="18"></line></svg></span>
                    <span>已有菜品</span>
                </a>
                <a href="{{ url_for('recipe_recommend') }}" class="nav-link">
                    <span class="nav-link-icon"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20"></path><path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z"></path></svg></span>
                    <span>菜谱推荐</span>
                </a>
            </div>
        </nav>
        <div class="sidebar-footer">
            <div class="user-card">
                <div class="user-avatar" style="background: linear-gradient(135deg, var(--primary), var(--primary-dark));">{{ current_user.username[0] }}</div>
                <div class="user-info">
                    <div class="user-name">{{ current_user.username }}</div>
                    <div class="user-actions">
                        <a href="{{ url_for('change_password') }}" class="user-action-link">修改密码</a>
                        <span style="color: var(--text-muted);">|</span>
                        <a href="{{ url_for('logout') }}" class="user-action-link">退出</a>
                    </div>
                </div>
            </div>
        </div>
    </aside>

    <main class="main-content">
        <div class="page-header">
            <h1 class="page-title">添加新菜品</h1>
            <p class="page-subtitle">为菜单添加美味新菜品</p>
        </div>

        <div class="add-dish-container">
            <form method="POST" enctype="multipart/form-data" class="add-dish-form">
                <div class="form-card">
                    <div class="form-card-header">
                        <div class="form-card-icon">
                            <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                <path d="M3 2v7c0 1.1.9 2 2 2h4a2 2 0 0 0 2-2V2"></path>
                                <path d="M7 2v20"></path>
                                <path d="M21 15V2v0a5 5 0 0 0-5 5v6c0 1.1.9 2 2 2h3Zm0 0v7"></path>
                            </svg>
                        </div>
                        <h3 class="form-card-title">菜品信息</h3>
                    </div>

                    <div class="form-group">
                        <label class="form-label">菜品名称 <span class="required">*</span></label>
                        <input type="text" name="name" class="form-input" required placeholder="例如：红烧排骨">
                        <p class="form-hint">请输入菜品的完整名称</p>
                    </div>

                    <div class="form-group mb-0">
                        <label class="form-label">菜品简介</label>
                        <textarea name="description" class="form-input" rows="3" placeholder="简单描述口味、食材、特点..."></textarea>
                    </div>
                </div>

                <div class="form-card">
                    <div class="form-card-header">
                        <div class="form-card-icon">
                            <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                <rect x="3" y="3" width="18" height="18" rx="2" ry="2"></rect>
                                <circle cx="8.5" cy="8.5" r="1.5"></circle>
                                <polyline points="21 15 16 10 5 21"></polyline>
                            </svg>
                        </div>
                        <h3 class="form-card-title">菜品图片</h3>
                    </div>

                    <div class="image-upload-area">
                        <div class="upload-option">
                            <div class="upload-icon">
                                <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                    <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path>
                                    <polyline points="17 8 12 3 7 8"></polyline>
                                    <line x1="12" y1="3" x2="12" y2="15"></line>
                                </svg>
                            </div>
                            <label class="form-label">上传本地图片</label>
                            <input type="file" name="image_file" accept="image/*" class="file-input" id="imageFile">
                            <p class="form-hint">支持 JPG、PNG、GIF 格式</p>
                        </div>

                        <div class="upload-divider"><span>或</span></div>

                        <div class="upload-option">
                            <div class="upload-icon">
                                <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                    <path d="M10 13a5 5 0 0 0 7.54.54l3-3a5 5 0 0 0-7.07-7.07l-1.72 1.71"></path>
                                    <path d="M14 11a5 5 0 0 0-7.54-.54l-3 3a5 5 0 0 0 7.07 7.07l1.71-1.71"></path>
                                </svg>
                            </div>
                            <label class="form-label">输入图片链接</label>
                            <input type="text" name="image_url" class="form-input" placeholder="https://...">
                            <p class="form-hint">粘贴图片的网络地址</p>
                        </div>
                    </div>
                </div>

                <div class="form-actions">
                    <a href="{{ url_for('list_dishes') }}" class="btn btn-outline">取消</a>
                    <button type="submit" class="btn btn-primary btn-lg">
                        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <line x1="12" y1="5" x2="12" y2="19"></line>
                            <line x1="5" y1="12" x2="19" y2="12"></line>
                        </svg>
                        添加菜品
                    </button>
                </div>
            </form>
        </div>
    </main>
</div>

<style>
    .add-dish-container { max-width: 780px; }

    .form-card {
        background: var(--surface);
        border-radius: var(--radius-lg);
        padding: 26px;
        margin-bottom: 20px;
        box-shadow: var(--shadow-sm);
        border: 1px solid var(--border);
    }

    .form-card-header {
        display: flex;
        align-items: center;
        gap: 14px;
        margin-bottom: 22px;
        padding-bottom: 14px;
        border-bottom: 1px solid var(--border-light);
    }

    .form-card-icon {
        width: 44px;
        height: 44px;
        background: var(--primary-glow);
        border-radius: var(--radius);
        display: flex;
        align-items: center;
        justify-content: center;
        color: var(--primary);
    }

    .form-card-title { font-size: 17px; font-weight: 700; }

    .required { color: var(--danger); margin-left: 3px; }
    .form-hint { font-size: 12px; color: var(--text-muted); margin-top: 5px; }

    .image-upload-area {
        display: grid;
        grid-template-columns: 1fr auto 1fr;
        gap: 20px;
        align-items: center;
    }

    .upload-option {
        text-align: center;
        padding: 22px;
        border: 2px dashed var(--border);
        border-radius: var(--radius-lg);
        transition: var(--transition);
    }

    .upload-option:hover {
        border-color: var(--primary);
        background: var(--primary-glow);
    }

    .upload-icon {
        width: 56px;
        height: 56px;
        margin: 0 auto 14px;
        background: var(--surface-hover);
        border-radius: 50%;
        display: flex;
        align-items: center;
        justify-content: center;
        color: var(--text-muted);
    }

    .upload-divider {
        display: flex;
        flex-direction: column;
        align-items: center;
        color: var(--text-muted);
        font-size: 12px;
        font-weight: 600;
    }

    .upload-divider::before, .upload-divider::after {
        content: '';
        width: 1px;
        height: 36px;
        background: var(--border);
    }

    .upload-divider span { padding: 8px 0; }

    .file-input {
        width: 100%;
        padding: 8px;
        border: 1px solid var(--border);
        border-radius: var(--radius-sm);
        margin-top: 10px;
        font-size: 13px;
    }

    .form-actions { display: flex; justify-content: flex-end; gap: 14px; }

    @media (max-width: 768px) {
        .image-upload-area { grid-template-columns: 1fr; }
        .upload-divider { flex-direction: row; gap: 14px; }
        .upload-divider::before, .upload-divider::after { width: 50px; height: 1px; }
        .form-actions { flex-direction: column-reverse; }
        .form-actions .btn { width: 100%; }
    }
</style>
{% endblock %}
