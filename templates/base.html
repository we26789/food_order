<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>家庭点菜</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #FF6B35;
            --primary-dark: #E85A2A;
            --primary-light: #FF8F66;
            --primary-glow: rgba(255, 107, 53, 0.15);
            --secondary: #0F172A;
            --secondary-light: #1E293B;
            --secondary-muted: #334155;
            --accent: #10B981;
            --accent-light: #34D399;
            --accent-glow: rgba(16, 185, 129, 0.15);
            --background: #F8FAFC;
            --surface: #FFFFFF;
            --surface-glass: rgba(255, 255, 255, 0.72);
            --surface-hover: #F1F5F9;
            --text-primary: #0F172A;
            --text-secondary: #475569;
            --text-muted: #94A3B8;
            --text-inverse: #FFFFFF;
            --border: #E2E8F0;
            --border-light: #F1F5F9;
            --success: #10B981;
            --success-light: rgba(16, 185, 129, 0.1);
            --warning: #F59E0B;
            --warning-light: rgba(245, 158, 11, 0.1);
            --danger: #EF4444;
            --danger-light: rgba(239, 68, 68, 0.1);
            --info: #3B82F6;
            --info-light: rgba(59, 130, 246, 0.1);
            --shadow-xs: 0 1px 2px rgba(0, 0, 0, 0.04);
            --shadow-sm: 0 1px 3px rgba(0, 0, 0, 0.06), 0 1px 2px rgba(0, 0, 0, 0.04);
            --shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.07), 0 2px 4px -2px rgba(0, 0, 0, 0.05);
            --shadow-md: 0 6px 16px -4px rgba(0, 0, 0, 0.08), 0 3px 6px -2px rgba(0, 0, 0, 0.04);
            --shadow-lg: 0 12px 28px -6px rgba(0, 0, 0, 0.1), 0 4px 10px -4px rgba(0, 0, 0, 0.04);
            --shadow-xl: 0 24px 48px -12px rgba(0, 0, 0, 0.12);
            --radius-xs: 6px;
            --radius-sm: 8px;
            --radius: 12px;
            --radius-lg: 16px;
            --radius-xl: 20px;
            --radius-2xl: 24px;
            --transition-fast: all 0.15s cubic-bezier(0.4, 0, 0.2, 1);
            --transition: all 0.25s cubic-bezier(0.4, 0, 0.2, 1);
            --transition-slow: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            --font: 'Noto Sans SC', -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: var(--font);
            background: var(--background);
            color: var(--text-primary);
            line-height: 1.6;
            min-height: 100vh;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
        }

        a {
            color: var(--primary);
            text-decoration: none;
            transition: var(--transition-fast);
        }
        a:hover { color: var(--primary-dark); }

        /* ===== Scrollbar ===== */
        ::-webkit-scrollbar { width: 6px; height: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: var(--text-muted); border-radius: 10px; }
        ::-webkit-scrollbar-thumb:hover { background: var(--text-secondary); }

        /* ===== Flash Messages ===== */
        .flash-container {
            position: fixed;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 9999;
            display: flex;
            flex-direction: column;
            gap: 10px;
            pointer-events: none;
        }

        .flash-msg {
            pointer-events: auto;
            padding: 14px 22px;
            border-radius: var(--radius);
            font-weight: 500;
            font-size: 14px;
            box-shadow: var(--shadow-lg);
            display: flex;
            align-items: center;
            gap: 10px;
            animation: flashIn 0.4s cubic-bezier(0.16, 1, 0.3, 1);
            backdrop-filter: blur(16px) saturate(180%);
            border: 1px solid rgba(255,255,255,0.15);
            max-width: 420px;
        }

        @keyframes flashIn {
            from { opacity: 0; transform: translateY(-16px) scale(0.96); }
            to { opacity: 1; transform: translateY(0) scale(1); }
        }

        .flash-success { background: linear-gradient(135deg, rgba(16, 185, 129, 0.92), rgba(5, 150, 105, 0.92)); color: white; }
        .flash-warning { background: linear-gradient(135deg, rgba(245, 158, 11, 0.92), rgba(217, 119, 6, 0.92)); color: white; }
        .flash-danger { background: linear-gradient(135deg, rgba(239, 68, 68, 0.92), rgba(220, 38, 38, 0.92)); color: white; }
        .flash-info { background: linear-gradient(135deg, rgba(59, 130, 246, 0.92), rgba(37, 99, 235, 0.92)); color: white; }

        /* ===== App Layout ===== */
        .app-layout {
            display: flex;
            min-height: 100vh;
        }

        /* ===== Sidebar ===== */
        .sidebar {
            width: 272px;
            background: var(--secondary);
            color: var(--text-inverse);
            display: flex;
            flex-direction: column;
            position: fixed;
            top: 0;
            left: 0;
            height: 100vh;
            z-index: 100;
            border-right: 1px solid rgba(255,255,255,0.06);
            overflow: hidden;
        }

        .sidebar::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background:
                radial-gradient(ellipse at 20% 0%, rgba(255, 107, 53, 0.08) 0%, transparent 60%),
                radial-gradient(ellipse at 80% 100%, rgba(16, 185, 129, 0.06) 0%, transparent 60%);
            pointer-events: none;
        }

        .sidebar-header {
            padding: 24px 22px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.06);
            position: relative;
        }

        .sidebar-logo {
            display: flex;
            align-items: center;
            gap: 14px;
        }

        .sidebar-logo-icon {
            width: 42px;
            height: 42px;
            background: linear-gradient(135deg, var(--primary), var(--primary-light));
            border-radius: var(--radius);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
            box-shadow: 0 4px 14px rgba(255, 107, 53, 0.3);
        }

        .sidebar-logo-text {
            font-size: 18px;
            font-weight: 700;
            color: white;
            letter-spacing: -0.3px;
        }

        .sidebar-role {
            font-size: 12px;
            color: var(--text-muted);
            margin-top: 2px;
            font-weight: 400;
        }

        .sidebar-nav {
            flex: 1;
            padding: 16px 12px;
            overflow-y: auto;
            position: relative;
        }

        .nav-section {
            margin-bottom: 8px;
        }

        .nav-section-title {
            font-size: 11px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.8px;
            color: rgba(148, 163, 184, 0.7);
            padding: 8px 14px;
            margin-bottom: 4px;
        }

        .nav-link {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 11px 14px;
            color: rgba(255, 255, 255, 0.6);
            border-radius: var(--radius);
            font-weight: 500;
            font-size: 14px;
            transition: var(--transition);
            margin-bottom: 2px;
            position: relative;
        }

        .nav-link:hover {
            background: rgba(255, 255, 255, 0.07);
            color: rgba(255, 255, 255, 0.9);
        }

        .nav-link.active {
            background: linear-gradient(135deg, var(--primary), var(--primary-dark));
            color: white;
            box-shadow: 0 4px 14px rgba(255, 107, 53, 0.3);
        }

        .nav-link-icon {
            width: 20px;
            height: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 16px;
            flex-shrink: 0;
        }

        .sidebar-footer {
            padding: 16px 18px;
            border-top: 1px solid rgba(255, 255, 255, 0.06);
            position: relative;
        }

        .user-card {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 12px;
            background: rgba(255, 255, 255, 0.04);
            border-radius: var(--radius);
            border: 1px solid rgba(255,255,255,0.06);
        }

        .user-avatar {
            width: 40px;
            height: 40px;
            background: linear-gradient(135deg, var(--accent), var(--accent-light));
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 700;
            font-size: 15px;
            flex-shrink: 0;
        }

        .user-info { flex: 1; min-width: 0; }

        .user-name {
            font-weight: 600;
            font-size: 14px;
            color: white;
        }

        .user-actions {
            display: flex;
            gap: 8px;
            margin-top: 3px;
        }

        .user-action-link {
            font-size: 12px;
            color: var(--text-muted);
            transition: var(--transition-fast);
        }
        .user-action-link:hover { color: var(--primary-light); }

        /* ===== Main Content ===== */
        .main-content {
            flex: 1;
            margin-left: 272px;
            padding: 36px 40px;
            min-height: 100vh;
        }

        .page-header {
            margin-bottom: 32px;
        }

        .page-title {
            font-size: 28px;
            font-weight: 800;
            color: var(--text-primary);
            margin-bottom: 6px;
            letter-spacing: -0.5px;
        }

        .page-subtitle {
            font-size: 15px;
            color: var(--text-secondary);
            font-weight: 400;
        }

        /* ===== Cards ===== */
        .card {
            background: var(--surface);
            border-radius: var(--radius-lg);
            padding: 24px;
            box-shadow: var(--shadow-sm);
            border: 1px solid var(--border);
            transition: var(--transition);
        }
        .card:hover { box-shadow: var(--shadow-md); }

        .card-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 20px;
        }

        .card-title {
            font-size: 17px;
            font-weight: 700;
            color: var(--text-primary);
        }

        /* ===== Buttons ===== */
        .btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            padding: 11px 22px;
            font-size: 14px;
            font-weight: 600;
            border-radius: var(--radius);
            border: none;
            cursor: pointer;
            transition: var(--transition);
            text-decoration: none;
            white-space: nowrap;
            font-family: var(--font);
            position: relative;
            overflow: hidden;
        }

        .btn::after {
            content: '';
            position: absolute;
            inset: 0;
            background: linear-gradient(rgba(255,255,255,0.15), transparent);
            opacity: 0;
            transition: var(--transition-fast);
        }
        .btn:hover::after { opacity: 1; }

        .btn-primary {
            background: linear-gradient(135deg, var(--primary), var(--primary-dark));
            color: white;
            box-shadow: 0 2px 10px rgba(255, 107, 53, 0.25);
        }
        .btn-primary:hover {
            transform: translateY(-1px);
            box-shadow: 0 4px 16px rgba(255, 107, 53, 0.35);
            color: white;
        }

        .btn-secondary {
            background: var(--secondary);
            color: white;
        }
        .btn-secondary:hover { background: var(--secondary-light); color: white; }

        .btn-success {
            background: linear-gradient(135deg, var(--success), #059669);
            color: white;
            box-shadow: 0 2px 10px rgba(16, 185, 129, 0.25);
        }
        .btn-success:hover {
            transform: translateY(-1px);
            box-shadow: 0 4px 16px rgba(16, 185, 129, 0.35);
            color: white;
        }

        .btn-danger {
            background: linear-gradient(135deg, var(--danger), #DC2626);
            color: white;
            box-shadow: 0 2px 10px rgba(239, 68, 68, 0.25);
        }
        .btn-danger:hover {
            transform: translateY(-1px);
            box-shadow: 0 4px 16px rgba(239, 68, 68, 0.35);
            color: white;
        }

        .btn-warning {
            background: linear-gradient(135deg, var(--warning), #D97706);
            color: white;
        }

        .btn-outline {
            background: transparent;
            border: 1.5px solid var(--border);
            color: var(--text-primary);
        }
        .btn-outline:hover {
            border-color: var(--primary);
            color: var(--primary);
            background: var(--primary-glow);
        }

        .btn-ghost {
            background: transparent;
            color: var(--text-secondary);
            border: none;
        }
        .btn-ghost:hover {
            background: var(--surface-hover);
            color: var(--text-primary);
        }

        .btn-sm { padding: 8px 14px; font-size: 13px; }
        .btn-lg { padding: 14px 28px; font-size: 15px; }

        /* ===== Forms ===== */
        .form-group { margin-bottom: 20px; }

        .form-label {
            display: block;
            font-size: 13px;
            font-weight: 600;
            color: var(--text-primary);
            margin-bottom: 6px;
            letter-spacing: -0.1px;
        }

        .form-input {
            width: 100%;
            padding: 12px 16px;
            font-size: 14px;
            border: 1.5px solid var(--border);
            border-radius: var(--radius);
            background: var(--surface);
            color: var(--text-primary);
            transition: var(--transition);
            outline: none;
            font-family: var(--font);
        }

        .form-input:focus {
            border-color: var(--primary);
            box-shadow: 0 0 0 3px var(--primary-glow);
        }

        .form-input::placeholder { color: var(--text-muted); }

        textarea.form-input {
            resize: vertical;
            min-height: 100px;
        }

        /* ===== Tables ===== */
        .table-container {
            background: var(--surface);
            border-radius: var(--radius-lg);
            overflow: hidden;
            box-shadow: var(--shadow-sm);
            border: 1px solid var(--border);
        }

        .data-table {
            width: 100%;
            border-collapse: collapse;
        }

        .data-table th {
            background: var(--secondary);
            color: rgba(255,255,255,0.9);
            font-weight: 600;
            font-size: 12px;
            text-transform: uppercase;
            letter-spacing: 0.6px;
            padding: 14px 18px;
            text-align: left;
        }

        .data-table td {
            padding: 14px 18px;
            border-bottom: 1px solid var(--border-light);
            font-size: 14px;
            color: var(--text-primary);
        }

        .data-table tbody tr {
            transition: var(--transition-fast);
        }

        .data-table tbody tr:hover {
            background: rgba(255, 107, 53, 0.02);
        }

        .data-table tbody tr:last-child td { border-bottom: none; }

        /* ===== Badges ===== */
        .badge {
            display: inline-flex;
            align-items: center;
            gap: 5px;
            padding: 5px 12px;
            font-size: 12px;
            font-weight: 600;
            border-radius: 20px;
            letter-spacing: 0.2px;
        }

        .badge-pending { background: var(--danger-light); color: var(--danger); }
        .badge-completed { background: var(--success-light); color: var(--success); }
        .badge-rejected { background: var(--warning-light); color: var(--warning); }

        /* ===== Dish Card ===== */
        .dish-card {
            background: var(--surface);
            border-radius: var(--radius-lg);
            overflow: hidden;
            box-shadow: var(--shadow-sm);
            border: 1px solid var(--border);
            transition: var(--transition);
            margin-bottom: 16px;
        }

        .dish-card:hover {
            transform: translateY(-3px);
            box-shadow: var(--shadow-lg);
            border-color: rgba(255, 107, 53, 0.2);
        }

        .dish-card-body {
            display: flex;
            gap: 24px;
            padding: 22px;
        }

        .dish-image {
            width: 140px;
            height: 140px;
            border-radius: var(--radius);
            object-fit: cover;
            flex-shrink: 0;
            cursor: pointer;
            transition: var(--transition);
        }

        .dish-image:hover { transform: scale(1.03); }

        .dish-info {
            flex: 1;
            display: flex;
            flex-direction: column;
        }

        .dish-name {
            font-size: 19px;
            font-weight: 700;
            color: var(--text-primary);
            margin-bottom: 6px;
            letter-spacing: -0.3px;
        }

        .dish-desc {
            font-size: 14px;
            color: var(--text-secondary);
            margin-bottom: 14px;
            line-height: 1.6;
        }

        .dish-form {
            display: flex;
            align-items: flex-end;
            gap: 14px;
            flex-wrap: wrap;
            margin-top: auto;
        }

        .dish-form .form-group { margin-bottom: 0; }

        /* ===== Grid ===== */
        .grid { display: grid; gap: 20px; }
        .grid-2 { grid-template-columns: repeat(2, 1fr); }
        .grid-3 { grid-template-columns: repeat(3, 1fr); }
        .grid-4 { grid-template-columns: repeat(4, 1fr); }

        /* ===== Modal ===== */
        .modal-overlay {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(15, 23, 42, 0.5);
            backdrop-filter: blur(6px);
            z-index: 5000;
            align-items: center;
            justify-content: center;
        }

        .modal {
            background: var(--surface);
            border-radius: var(--radius-xl);
            padding: 28px;
            max-width: 460px;
            width: 92%;
            box-shadow: var(--shadow-xl);
            animation: modalIn 0.35s cubic-bezier(0.16, 1, 0.3, 1);
            border: 1px solid var(--border);
        }

        @keyframes modalIn {
            from { opacity: 0; transform: scale(0.95) translateY(8px); }
            to { opacity: 1; transform: scale(1) translateY(0); }
        }

        .modal-header { margin-bottom: 16px; }

        .modal-title {
            font-size: 19px;
            font-weight: 700;
            color: var(--text-primary);
        }

        .modal-body { margin-bottom: 20px; }

        .modal-footer {
            display: flex;
            gap: 10px;
            justify-content: flex-end;
        }

        /* ===== Image Preview ===== */
        .image-preview-overlay {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.92);
            z-index: 6000;
            align-items: center;
            justify-content: center;
        }

        .image-preview-close {
            position: absolute;
            top: 20px;
            right: 28px;
            font-size: 36px;
            color: white;
            cursor: pointer;
            transition: var(--transition-fast);
            opacity: 0.7;
        }
        .image-preview-close:hover { opacity: 1; color: var(--primary); }

        .image-preview-img {
            max-width: 90%;
            max-height: 90%;
            border-radius: var(--radius);
            box-shadow: var(--shadow-xl);
        }

        /* ===== Empty State ===== */
        .empty-state {
            text-align: center;
            padding: 72px 40px;
            color: var(--text-muted);
        }

        .empty-state-icon {
            font-size: 56px;
            margin-bottom: 20px;
            opacity: 0.4;
        }

        .empty-state-title {
            font-size: 19px;
            font-weight: 600;
            color: var(--text-secondary);
            margin-bottom: 6px;
        }

        .empty-state-desc { font-size: 14px; }

        /* ===== Stat Card ===== */
        .stat-card {
            background: var(--surface);
            border-radius: var(--radius-lg);
            padding: 22px;
            box-shadow: var(--shadow-sm);
            border: 1px solid var(--border);
            display: flex;
            align-items: center;
            gap: 16px;
            transition: var(--transition);
        }
        .stat-card:hover { box-shadow: var(--shadow-md); transform: translateY(-2px); }

        .stat-icon {
            width: 48px;
            height: 48px;
            border-radius: var(--radius);
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
        }

        .stat-content { flex: 1; }

        .stat-value {
            font-size: 24px;
            font-weight: 800;
            color: var(--text-primary);
            letter-spacing: -0.5px;
        }

        .stat-label {
            font-size: 13px;
            color: var(--text-secondary);
            font-weight: 500;
        }

        /* ===== Utilities ===== */
        .text-center { text-align: center; }
        .text-right { text-align: right; }
        .mb-0 { margin-bottom: 0; }
        .mb-1 { margin-bottom: 8px; }
        .mb-2 { margin-bottom: 16px; }
        .mb-3 { margin-bottom: 24px; }
        .mb-4 { margin-bottom: 32px; }
        .mt-2 { margin-top: 16px; }
        .mt-3 { margin-top: 24px; }
        .flex { display: flex; }
        .items-center { align-items: center; }
        .justify-between { justify-content: space-between; }
        .gap-2 { gap: 16px; }
        .gap-3 { gap: 24px; }
        .flex-wrap { flex-wrap: wrap; }

        /* ===== Responsive ===== */
        @media (max-width: 1024px) {
            .sidebar { width: 240px; }
            .main-content { margin-left: 240px; padding: 28px; }
        }

        @media (max-width: 768px) {
            .sidebar {
                width: 100%;
                height: auto;
                position: relative;
                flex-direction: row;
                flex-wrap: wrap;
            }
            .sidebar-header { padding: 16px; }
            .sidebar-nav {
                display: flex;
                overflow-x: auto;
                padding: 8px 12px;
                gap: 4px;
                width: 100%;
            }
            .nav-section { display: flex; gap: 4px; margin-bottom: 0; }
            .nav-section-title { display: none; }
            .nav-link { padding: 8px 14px; font-size: 13px; white-space: nowrap; }
            .sidebar-footer { display: none; }
            .main-content { margin-left: 0; padding: 20px; }
            .app-layout { flex-direction: column; }
            .dish-card-body { flex-direction: column; }
            .dish-image { width: 100%; height: 200px; }
            .grid-2, .grid-3, .grid-4 { grid-template-columns: 1fr; }
            .page-title { font-size: 24px; }
        }
    </style>
</head>
<body>
    {% with messages = get_flashed_messages(with_categories=true) %}
        {% if messages %}
            <div class="flash-container">
                {% for category, message in messages %}
                    <div class="flash-msg flash-{{ category }}">{{ message }}</div>
                {% endfor %}
            </div>
        {% endif %}
    {% endwith %}

    {% block content %}{% endblock %}

    <script>
    (function() {
        var messages = document.querySelectorAll('.flash-msg');
        if (messages.length > 0) {
            setTimeout(function() {
                messages.forEach(function(msg) {
                    msg.style.opacity = '0';
                    msg.style.transform = 'translateY(-12px) scale(0.96)';
                    setTimeout(function() { msg.remove(); }, 300);
                });
            }, 3500);
        }
    })();
    </script>
