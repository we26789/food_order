{% extends "base.html" %}
{% block content %}
<div class="login-page">
    <div class="login-container">
        <div class="login-card">
            <div class="login-header">
                <div class="login-logo">
                    <div class="login-logo-icon">
                        <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <path d="M3 2v7c0 1.1.9 2 2 2h4a2 2 0 0 0 2-2V2"></path>
                            <path d="M7 2v20"></path>
                            <path d="M21 15V2v0a5 5 0 0 0-5 5v6c0 1.1.9 2 2 2h3Zm0 0v7"></path>
                        </svg>
                    </div>
                </div>
                <h1 class="login-title">家庭点菜系统</h1>
                <p class="login-subtitle">欢迎回来，请登录您的账户</p>
            </div>

            <form method="POST" class="login-form">
                <div class="form-group">
                    <label class="form-label">用户名</label>
                    <div class="input-wrapper">
                        <span class="input-icon">
                            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path>
                                <circle cx="12" cy="7" r="4"></circle>
                            </svg>
                        </span>
                        <input type="text" name="username" class="form-input with-icon" required placeholder="输入用户名">
                    </div>
                </div>

                <div class="form-group">
                    <label class="form-label">密码</label>
                    <div class="input-wrapper">
                        <span class="input-icon">
                            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                <rect x="3" y="11" width="18" height="11" rx="2" ry="2"></rect>
                                <path d="M7 11V7a5 5 0 0 1 10 0v4"></path>
                            </svg>
                        </span>
                        <input type="password" name="password" class="form-input with-icon" required placeholder="输入密码">
                    </div>
                </div>

                <button type="submit" class="btn btn-primary btn-lg btn-block">
                    <span>登录系统</span>
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <line x1="5" y1="12" x2="19" y2="12"></line>
                        <polyline points="12 5 19 12 12 19"></polyline>
                    </svg>
                </button>
            </form>

            <div class="login-footer">
                <div class="login-divider">
                    <span>默认账号</span>
                </div>
                <div class="account-hints">
                    <div class="account-hint">
                        <span class="hint-role cooker">厨师</span>
                        <span class="hint-info">Cooker / 123456</span>
                    </div>
                    <div class="account-hint">
                        <span class="hint-role customer">顾客</span>
                        <span class="hint-info">Customer / 123456</span>
                    </div>
                </div>
            </div>
        </div>

        <div class="login-decoration">
            <div class="deco-circle deco-1"></div>
            <div class="deco-circle deco-2"></div>
            <div class="deco-circle deco-3"></div>
        </div>
    </div>
</div>

<style>
    .login-page {
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        background: linear-gradient(135deg, #1A1A2E 0%, #252541 50%, #1A1A2E 100%);
        padding: 20px;
        position: relative;
        overflow: hidden;
    }

    .login-container {
        position: relative;
        z-index: 10;
        width: 100%;
        max-width: 440px;
    }

    .login-card {
        background: var(--surface);
        border-radius: var(--radius-xl);
        padding: 48px 40px;
        box-shadow: var(--shadow-xl), 0 0 60px rgba(255, 107, 53, 0.15);
        position: relative;
        overflow: hidden;
    }

    .login-card::before {
        content: '';
        position: absolute;
        top: 0;
        left: 0;
        right: 0;
        height: 4px;
        background: linear-gradient(90deg, var(--primary), var(--accent));
    }

    .login-header {
        text-align: center;
        margin-bottom: 36px;
    }

    .login-logo {
        display: flex;
        justify-content: center;
        margin-bottom: 20px;
    }

    .login-logo-icon {
        width: 64px;
        height: 64px;
        background: linear-gradient(135deg, var(--primary), var(--primary-dark));
        border-radius: var(--radius-lg);
        display: flex;
        align-items: center;
        justify-content: center;
        color: white;
        box-shadow: 0 8px 24px rgba(255, 107, 53, 0.35);
    }

    .login-title {
        font-size: 26px;
        font-weight: 700;
        color: var(--text-primary);
        margin-bottom: 8px;
    }

    .login-subtitle {
        font-size: 14px;
        color: var(--text-secondary);
    }

    .login-form {
        margin-bottom: 32px;
    }

    .input-wrapper {
        position: relative;
    }

    .input-icon {
        position: absolute;
        left: 16px;
        top: 50%;
        transform: translateY(-50%);
        color: var(--text-muted);
        display: flex;
    }

    .form-input.with-icon {
        padding-left: 50px;
    }

    .btn-block {
        width: 100%;
    }

    .login-footer {
        text-align: center;
    }

    .login-divider {
        position: relative;
        margin-bottom: 20px;
    }

    .login-divider::before {
        content: '';
        position: absolute;
        top: 50%;
        left: 0;
        right: 0;
        height: 1px;
        background: var(--border);
    }

    .login-divider span {
        position: relative;
        background: var(--surface);
        padding: 0 16px;
        font-size: 12px;
        color: var(--text-muted);
        text-transform: uppercase;
        letter-spacing: 1px;
    }

    .account-hints {
        display: flex;
        gap: 16px;
        justify-content: center;
    }

    .account-hint {
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 6px;
        padding: 12px 20px;
        background: var(--background);
        border-radius: var(--radius);
        border: 1px solid var(--border);
    }

    .hint-role {
        font-size: 11px;
        font-weight: 700;
        text-transform: uppercase;
        letter-spacing: 0.5px;
        padding: 4px 10px;
        border-radius: 12px;
    }

    .hint-role.cooker {
        background: rgba(255, 107, 53, 0.1);
        color: var(--primary);
    }

    .hint-role.customer {
        background: rgba(22, 199, 154, 0.1);
        color: var(--accent);
    }

    .hint-info {
        font-size: 13px;
        color: var(--text-secondary);
        font-family: 'Courier New', monospace;
    }

    /* Decorations */
    .login-decoration {
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        pointer-events: none;
        z-index: 1;
    }

    .deco-circle {
        position: absolute;
        border-radius: 50%;
        opacity: 0.1;
    }

    .deco-1 {
        width: 500px;
        height: 500px;
        background: var(--primary);
        top: -200px;
        right: -200px;
    }

    .deco-2 {
        width: 400px;
        height: 400px;
        background: var(--accent);
        bottom: -150px;
        left: -150px;
    }

    .deco-3 {
        width: 200px;
        height: 200px;
        background: var(--primary);
        top: 50%;
        left: 10%;
    }

    @media (max-width: 480px) {
        .login-card {
            padding: 36px 24px;
        }

        .account-hints {
            flex-direction: column;
        }
    }
</style>
{% endblock %}
