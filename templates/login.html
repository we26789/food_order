{% extends "base.html" %}
{% block content %}
<h2>🔐 登录</h2>
<form method="POST" class="card" style="display:block; max-width:400px; margin:0 auto;">
    <div class="form-group">
        <label>用户名</label>
        <input type="text" name="username" required placeholder="Cooker 或 Customer">
    </div>
    <div class="form-group">
        <label>密码</label>
        <input type="password" name="password" required placeholder="初始密码 123456">
    </div>
    <button type="submit" class="btn">登录</button>
</form>
<p style="text-align:center; margin-top:15px; color:#777;">
    默认账号：厨师 Cooker / 顾客 Customer，密码均为 123456
</p>
{% endblock %}
