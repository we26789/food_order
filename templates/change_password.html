{% extends "base.html" %}
{% block content %}
<div class="password-page">
    <div class="password-container">
        <div class="password-card">
            <div class="password-header">
                <a href="{{ url_for('index') }}" class="back-link">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <line x1="19" y1="12" x2="5" y2="12"></line>
                        <polyline points="12 19 5 12 12 5"></polyline>
                    </svg>
                    返回
                </a>
                <div class="password-icon">
                    <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <rect x="3" y="11" width="18" height="11" rx="2" ry="2"></rect>
                        <path d="M7 11V7a5 5 0 0 1 10 0v4"></path>
                    </svg>
                </div>
                <h1 class="password-title">修改密码</h1>
                <p class="password-subtitle">请输入当前密码和新密码</p>
            </div>

            <form method="POST" class="password-form">
                <div class="form-group">
                    <label class="form-label">当前密码</label>
                    <div class="input-wrapper">
                        <span class="input-icon">
                            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                <rect x="3" y="11" width="18" height="11" rx="2" ry="2"></rect>
                                <path d="M7 11V7a5 5 0 0 1 10 0v4"></path>
                            </svg>
                        </span>
                        <input type="password" name="old_password" class="form-input with-icon" required placeholder="输入当前密码">
                    </div>
                </div>

                <div class="form-group">
                    <label class="form-label">新密码</label>
                    <div class="input-wrapper">
                        <span class="input-icon">
                            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                <path d="M21 2l-2 2m-7.61 7.61a5.5 5.5 0 1 1-7.778 7.778 5.5 5.5 0 0 1 7.777-7.777zm0 0L15.5 7.5m0 0l3 3L22 7l-3-3m-3.5 3.5L19 4"></path>
                            </svg>
                        </span>
                        <input type="password" name="new_password" class="form-input with-icon" required minlength="6" placeholder="输入新密码（至少6位）">
                    </div>
                    <p class="form-hint">密码长度至少6个字符</p>
                </div>

                <div class="form-group">
                    <label class="form-label">确认新密码</label>
                    <div class="input-wrapper">
                        <span class="input-icon">
                            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                <polyline points="20 6 9 17 4 12"></polyline>
                            </svg>
                        </span>
                        <input type="password" name="confirm_password" class="form-input with-icon" required minlength="6" placeholder="再次输入新密码">
                    </div>
                </div>

                <button type="submit" class="btn btn-primary btn-lg btn-block">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2z"></path>
                        <polyline points="17 21 17 13 7 13 7 21"></polyline>
                        <polyline points="7 3 7 8 15 8"></polyline>
                    </svg>
                    确认修改
                </button>
            </form>
        </div>
    </div>
</div>

<style>
    .password-page {
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        background: linear-gradient(135deg, #1A1A2E 0%, #252541 50%, #1A1A2E 100%);
        padding: 20px;
    }

    .password-container {
        width: 100%;
        max-width: 440px;
    }

    .password-card {
        background: var(--surface);
        border-radius: var(--radius-xl);
        padding: 40px;
        box-shadow: var(--shadow-xl);
        position: relative;
    }

    .password-card::before {
        content: '';
        position: absolute;
        top: 0;
        left: 0;
        right: 0;
        height: 4px;
        background: linear-gradient(90deg, var(--primary), var(--accent));
    }

    .password-header {
        text-align: center;
        margin-bottom: 32px;
    }

    .back-link {
        display: inline-flex;
        align-items: center;
        gap: 8px;
        color: var(--text-secondary);
        font-size: 14px;
        font-weight: 500;
        margin-bottom: 24px;
        transition: var(--transition);
    }

    .back-link:hover {
        color: var(--primary);
    }

    .password-icon {
        width: 64px;
        height: 64px;
        margin: 0 auto 16px;
        background: linear-gradient(135deg, var(--primary), var(--primary-dark));
        border-radius: var(--radius-lg);
        display: flex;
        align-items: center;
        justify-content: center;
        color: white;
        box-shadow: 0 8px 24px rgba(255, 107, 53, 0.35);
    }

    .password-title {
        font-size: 24px;
        font-weight: 700;
        color: var(--text-primary);
        margin-bottom: 8px;
    }

    .password-subtitle {
        font-size: 14px;
        color: var(--text-secondary);
    }

    .input-wrapper {
        position: relative;
    }

    .input-icon {
        position: absolute;
        left: 16px;
        top: 50%;
        transform: translateY(-50%);
        color: var(--text-muted);
        display: flex;
    }

    .form-input.with-icon {
        padding-left: 50px;
    }

    .form-hint {
        font-size: 12px;
        color: var(--text-muted);
        margin-top: 6px;
    }

    .btn-block {
        width: 100%;
    }

    @media (max-width: 480px) {
        .password-card {
            padding: 32px 24px;
        }
    }
</style>
{% endblock %}
