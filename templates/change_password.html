{% extends "base.html" %}
{% block content %}
<div class="password-page">
    <div class="password-bg">
        <div class="bg-orb orb-1"></div>
        <div class="bg-orb orb-2"></div>
    </div>

    <div class="password-container">
        <div class="password-card">
            <div class="password-header">
                <a href="javascript:history.back()" class="back-link">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <line x1="19" y1="12" x2="5" y2="12"></line>
                        <polyline points="12 19 5 12 12 5"></polyline>
                    </svg>
                    返回
                </a>
                <div class="password-icon">
                    <svg width="26" height="26" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <rect x="3" y="11" width="18" height="11" rx="2" ry="2"></rect>
                        <path d="M7 11V7a5 5 0 0 1 10 0v4"></path>
                    </svg>
                </div>
                <h1 class="password-title">修改密码</h1>
                <p class="password-subtitle">请输入当前密码和新密码</p>
            </div>

            <form method="POST" class="password-form">
                <div class="form-group">
                    <label class="form-label">当前密码</label>
                    <div class="input-wrapper">
                        <span class="input-icon">
                            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                <rect x="3" y="11" width="18" height="11" rx="2" ry="2"></rect>
                                <path d="M7 11V7a5 5 0 0 1 10 0v4"></path>
                            </svg>
                        </span>
                        <input type="password" name="old_password" class="form-input with-icon" required placeholder="输入当前密码">
                    </div>
                </div>

                <div class="form-group">
                    <label class="form-label">新密码</label>
                    <div class="input-wrapper">
                        <span class="input-icon">
                            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                <path d="M21 2l-2 2m-7.61 7.61a5.5 5.5 0 1 1-7.778 7.778 5.5 5.5 0 0 1 7.777-7.777zm0 0L15.5 7.5m0 0l3 3L22 7l-3-3m-3.5 3.5L19 4"></path>
                            </svg>
                        </span>
                        <input type="password" name="new_password" class="form-input with-icon" required minlength="6" placeholder="输入新密码（至少6位）">
                    </div>
                    <p class="form-hint">密码长度至少6个字符</p>
                </div>

                <div class="form-group">
                    <label class="form-label">确认新密码</label>
                    <div class="input-wrapper">
                        <span class="input-icon">
                            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                <polyline points="20 6 9 17 4 12"></polyline>
                            </svg>
                        </span>
                        <input type="password" name="confirm_password" class="form-input with-icon" required minlength="6" placeholder="再次输入新密码">
                    </div>
                </div>

                <button type="submit" class="btn btn-primary btn-lg btn-block">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <polyline points="20 6 9 17 4 12"></polyline>
                    </svg>
                    确认修改
                </button>
            </form>
        </div>
    </div>
</div>

<style>
    .password-page {
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        background: var(--secondary);
        padding: 20px;
        position: relative;
        overflow: hidden;
    }

    .password-bg { position: absolute; inset: 0; pointer-events: none; }

    .bg-orb { position: absolute; border-radius: 50%; filter: blur(80px); }
    .orb-1 { width: 400px; height: 400px; background: rgba(255, 107, 53, 0.1); top: -150px; right: -100px; }
    .orb-2 { width: 300px; height: 300px; background: rgba(16, 185, 129, 0.08); bottom: -120px; left: -80px; }

    .password-container { position: relative; z-index: 10; width: 100%; max-width: 420px; }

    .password-card {
        background: rgba(255, 255, 255, 0.03);
        backdrop-filter: blur(24px) saturate(150%);
        border: 1px solid rgba(255, 255, 255, 0.08);
        border-radius: var(--radius-xl);
        padding: 36px;
        box-shadow: 0 32px 64px rgba(0, 0, 0, 0.3);
        position: relative;
    }

    .password-card::before {
        content: '';
        position: absolute;
        top: 0;
        left: 0;
        right: 0;
        height: 2px;
        background: linear-gradient(90deg, var(--primary), var(--accent));
    }

    .password-header { text-align: center; margin-bottom: 28px; }

    .back-link {
        display: inline-flex;
        align-items: center;
        gap: 6px;
        color: rgba(148, 163, 184, 0.6);
        font-size: 13px;
        font-weight: 500;
        margin-bottom: 20px;
        transition: var(--transition-fast);
    }
    .back-link:hover { color: var(--primary-light); }

    .password-icon {
        width: 56px;
        height: 56px;
        margin: 0 auto 14px;
        background: linear-gradient(135deg, var(--primary), var(--primary-dark));
        border-radius: var(--radius-lg);
        display: flex;
        align-items: center;
        justify-content: center;
        color: white;
        box-shadow: 0 8px 24px rgba(255, 107, 53, 0.3);
    }

    .password-title { font-size: 24px; font-weight: 800; color: white; margin-bottom: 6px; letter-spacing: -0.5px; }
    .password-subtitle { font-size: 14px; color: rgba(148, 163, 184, 0.7); }

    .password-form .form-label { color: rgba(255,255,255,0.7); }
    .password-form .form-input {
        background: rgba(255, 255, 255, 0.05);
        border: 1.5px solid rgba(255, 255, 255, 0.1);
        color: white;
    }
    .password-form .form-input::placeholder { color: rgba(148, 163, 184, 0.4); }
    .password-form .form-input:focus {
        border-color: var(--primary);
        box-shadow: 0 0 0 3px rgba(255, 107, 53, 0.15);
        background: rgba(255, 255, 255, 0.08);
    }

    .input-wrapper { position: relative; }
    .input-icon { position: absolute; left: 14px; top: 50%; transform: translateY(-50%); color: rgba(148, 163, 184, 0.4); display: flex; }
    .form-input.with-icon { padding-left: 46px; }
    .form-hint { font-size: 12px; color: rgba(148, 163, 184, 0.4); margin-top: 5px; }
    .btn-block { width: 100%; }

    @media (max-width: 480px) { .password-card { padding: 28px 22px; } }
</style>
{% endblock %}
